version: 3


tasks:
    
  llm:
    silent: true
    desc: llm
    cmds:
    - test -n "OLLAMA_HOST" || die "ollama host not set, run ollama-config"
    - | 
      arr={{._args_}}
      llm "${arr[@]}"

  ollama-config:
    silent: true
    desc: configure ollama
    cmds:
    - |
      if test -n "{{._host_}}"
      then
        config OLLAMA_HOST="{{._host_}}"
      else
        echo -n "Please enter your Ollama host (e.g. http://localhost:11434 or https://ollama.com):"
        read "OLLAMA_HOST"
        config OLLAMA_HOST="$(echo $OLLAMA_HOST | tr -d '\r')"
      fi
    - |
      if test -n "{{._key_}}"
      then
        config OLLAMA_HEADERS="Authorization=Bearer {{._key_}}"
      else
        echo -n "Please enter your Ollama key (leave empty for local ollama):"
        read "OLLAMA_TOKEN"
        config OLLAMA_HEADERS="Authorization=Bearer $(echo "$OLLAMA_TOKEN" | tr -d '\r')"
      fi
    - |
      if test -n "{{._model_}}"
      then
        echo "OLLAMA_HOST set to {{._host_}}"
      else
        echo "Ollama Models:"
        if ops aid llm models | rg "^Ollama:"
        then
          echo -n "Please enter your Ollama default model:"
          read "OLLAMA_MODEL"
          ops aid llm models default $(echo "$OLLAMA_MODEL" | tr -d '\r')
        else 
          echo "No Ollama models found, skipping default model configuration"
        fi
      fi


  new:
    silent: true
    desc: generate a new python action
    vars:
       ACTION: 
         sh: echo  "{{._action_}}" | cut -d/ -f2
       PACKAGE: 
         sh: echo  "{{._action_}}" | cut -d/ -f1
    env:
       ACTION: "{{.ACTION}}"
       PACKAGE: "{{.PACKAGE}}"
       DIR:  "packages/{{.PACKAGE}}/{{.ACTION}}"
       FILE: "packages/{{.PACKAGE}}/{{.ACTION}}/{{.ACTION}}.py"
    cmds:
    #- test ! -e "$OPS_PWD/$FILE" || die "file already exists"
    - echo $ACTION
    - echo $PACKAGE
    - echo $DIR
    - echo $FILE
    - |
      mkdir -p $OPS_PWD/tests/$PACKAGE
      mkdir -p $OPS_PWD/$DIR
    - |
      cat <<EOF >$OPS_PWD/$FILE
      def $ACTION(args):
        return { "output": "$ACTION" }
      EOF
    - |
      cat <<EOF >$OPS_PWD/$DIR/__main__.py
      #--kind python:default
      #--web true
      import $ACTION
      def main(args):
        return { "body": $ACTION.$ACTION(args) }
      EOF
    - |
      cat <<EOF >$OPS_PWD/tests/$PACKAGE/test_${ACTION}.py
      import sys 
      sys.path.append("$DIR")
      import $ACTION
      
      def test_$ACTION():
          res = $ACTION.$ACTION({})
          assert res["output"] == "$ACTION"
      EOF
    - |
      cat <<EOF >$OPS_PWD/tests/$PACKAGE/test_${ACTION}_int.py
      import os, requests as req
      def test_$ACTION():
          url = os.environ.get("OPSDEV_HOST") + "/api/my/$PACKAGE/$ACTION"
          res = req.get(url).json()
          assert res.get("output") == "$ACTION"
      EOF


